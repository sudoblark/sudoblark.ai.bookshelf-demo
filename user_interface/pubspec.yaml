name: user_interface
description: >
  Flutter UI for the Bookshelf Demo - a local, offline-friendly ETL pipeline
  for processing book cover images and extracting metadata. This app provides
  image upload capabilities and displays processed book metadata in a list view.
  Designed as a conference demo application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI and State Management
  cupertino_icons: ^1.0.8
  provider: ^6.0.0

  # HTTP and file handling
  http: ^1.1.0
  image_picker: ^1.0.0
  file_picker: ^8.0.0

  # Internationalization (optional, for date/time formatting)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
