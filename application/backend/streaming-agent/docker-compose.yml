services:
  streaming-agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-west-2}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-5-sonnet-20241022-v2:0}
      BEDROCK_REGION: ${AWS_DEFAULT_REGION:-eu-west-2}
      LANDING_BUCKET: ${LANDING_BUCKET}
      RAW_BUCKET: ${RAW_BUCKET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ISBN_LOOKUP_ENABLED: ${ISBN_LOOKUP_ENABLED:-true}
      ISBN_API_TIMEOUT: ${ISBN_API_TIMEOUT:-5.0}
