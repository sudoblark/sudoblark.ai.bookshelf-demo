repos:
  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black
        name: Format Python code with Black
        language_version: python3.11
        files: ^(lambda-packages|tests)/.*\.py$

  # Python import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: Sort Python imports with isort
        language_version: python3.11
        files: ^(lambda-packages|tests)/.*\.py$
        args: ["--profile", "black", "--line-length", "100"]

  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        name: Lint Python with Flake8
        language_version: python3.11
        files: ^(lambda-packages|tests)/.*\.py$
        args: ["--max-line-length=100", "--extend-ignore=E203,W503"]

  # Python type checking (per Lambda to avoid module conflicts)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        name: mypy type check (unzip-processor)
        files: ^lambda-packages/unzip-processor/.*\.py$
        additional_dependencies: ['boto3-stubs[s3]']

      - id: mypy
        name: mypy type check (metadata-extractor)
        files: ^lambda-packages/metadata-extractor/.*\.py$
        additional_dependencies: ['boto3-stubs[s3,bedrock-runtime]', 'types-Pillow']

  # Python security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Security scan with Bandit
        language_version: python3.11
        files: ^lambda-packages/.*\.py$
        args: ["-r", "--skip", "B101"]
        additional_dependencies: ["pbr"]

  # Terraform formatting
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.88.1
    hooks:
      - id: terraform_fmt
        args:
          - --args=-recursive

  # General file fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        types: [text]
      - id: end-of-file-fixer
        types: [text]
      - id: check-yaml
        args: ['--unsafe']
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  # YAML formatting for workflows
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        files: ^\.github/workflows/.*\.ya?ml$
