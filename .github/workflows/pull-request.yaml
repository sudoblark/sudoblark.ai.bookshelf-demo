---
name: Pull Request Quality Checks

'on':
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  format_check:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Terraform format check
        uses: dflook/terraform-fmt-check@v2
        id: fmt-check
        with:
          path: ./infrastructure/aws-sudoblark-development

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::741139166799:role/service-accounts/aws-sudoblark-management-github-cicd-role
          aws-region: eu-west-2

      - name: terraform validate
        uses: dflook/terraform-validate@v2
        id: validate
        with:
          path: ./infrastructure/aws-sudoblark-development

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./infrastructure/aws-sudoblark-development
          framework: terraform
          output_format: cli
          soft_fail: false

  python_lint:
    name: Python Code Quality - ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - lambda: common
            path: application/backend/common
          - lambda: streaming-agent
            path: application/backend/streaming-agent
          - lambda: raw-to-processed-copy
            path: application/backend/raw-to-processed-copy
          - lambda: vector-generator
            path: application/backend/vector-generator
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          if [ -f "${{ matrix.path }}/requirements.txt" ]; then
            pip install -r ${{ matrix.path }}/requirements.txt
          fi
          if [ -f "${{ matrix.path }}/requirements-ci.txt" ]; then
            pip install -r ${{ matrix.path }}/requirements-ci.txt
          fi

      - name: Run Black
        run: black --config pyproject.toml --check ${{ matrix.path }}/

      - name: Run isort
        run: isort --settings-path pyproject.toml --check-only ${{ matrix.path }}/

      - name: Run Flake8
        run: flake8 ${{ matrix.path }}/

      - name: Run mypy
        run: mypy ${{ matrix.path }}/

      - name: Run Bandit
        run: |
          bandit -r ${{ matrix.path }}/ -f json \
            -o bandit-report-${{ matrix.lambda }}.json || true

      - name: Upload Bandit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report-${{ matrix.lambda }}
          path: bandit-report-${{ matrix.lambda }}.json

  python_test:
    name: Python Tests - ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - lambda: common
            path: application/backend/common
            test_files: tests/backend/common/
          - lambda: streaming-agent
            path: application/backend/streaming-agent
            test_files: tests/backend/streaming-agent/
          - lambda: raw-to-processed-copy
            path: application/backend/raw-to-processed-copy
            test_files: tests/backend/raw-to-processed-copy/
          - lambda: vector-generator
            path: application/backend/vector-generator
            test_files: tests/backend/vector-generator/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          if [ -f "${{ matrix.path }}/requirements.txt" ]; then
            pip install -r ${{ matrix.path }}/requirements.txt
          fi
          if [ -f "${{ matrix.path }}/requirements-ci.txt" ]; then
            pip install -r ${{ matrix.path }}/requirements-ci.txt
          fi

      - name: Run pytest with coverage
        run: |
          pytest ${{ matrix.test_files }} \
            --cov=${{ matrix.path }} \
            --cov-report=term-missing --cov-report=html \
            --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.lambda }}
          path: htmlcov/

  frontend_quality:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: application/frontend/package-lock.json

      - name: Install dependencies
        working-directory: application/frontend
        run: npm ci

      - name: TypeScript Check & Build
        working-directory: application/frontend
        run: npm run build

  test:
    name: Terraform Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Read Terraform version
        id: terraform-version
        working-directory: ./infrastructure/aws-sudoblark-development
        run: echo "version=$(cat .terraform-version)" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}

      - name: Terraform Init - Data Module
        run: terraform init
        working-directory: ./modules/data

      - name: Terraform Test - Data Module
        run: terraform test
        working-directory: ./modules/data

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::741139166799:role/service-accounts/aws-sudoblark-management-github-cicd-role
          aws-region: eu-west-2

      - name: terraform plan
        uses: dflook/terraform-plan@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: ./infrastructure/aws-sudoblark-development
